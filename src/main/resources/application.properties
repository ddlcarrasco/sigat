# =============================================
# Configuracion del servidor
# =============================================
server.port=8081
server.servlet.context-path=/sigat

# =============================================
# Configuracion de la base de datos MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/sigat?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=sigatuser
spring.datasource.password=sigatuser
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# Configuracion de Hibernate / JPA
# =============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# =============================================
# Configuracion JWT
# =============================================
jwt.secret=c2lnYXQtc2VjcmV0LWtleS1wYXJhLXNpc3RlbWEtZGUtYWd1YS1wb3RhYmxlLTIwMjY=
jwt.expiration=86400000

# Contrasena del primer usuario admin (solo desarrollo — en produccion usar variable de entorno)
# En produccion: establecer la variable de entorno ADMIN_INITIAL_PASSWORD en el servidor
admin.initial.password=${ADMIN_INITIAL_PASSWORD:}

# =============================================
# Configuracion del municipio
# =============================================
sigat.municipio.iniciales=MTY

# =============================================
# CORS — origenes adicionales (red local)
# =============================================
sigat.cors.origenes-adicionales=http://192.168.1.99:5173
